<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Un po' di storia - Pro Loco Albano di Lucania</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root { 
            --primary-color: #5d9cec; 
            --accent-color: #4fc1e9;
            --vetrina-bg: #f0f7ff; /* L'azzurro tenue della tua vetrina */
            --text-dark: #4a4a4a;
            --text-muted: #666;
        } 
        
        body { 
            font-family: 'Segoe UI', Tahoma, sans-serif; 
            color: var(--text-dark); 
            background-color: #fff; 
            scroll-behavior: smooth; 
        }

        /* OFFSET PER ANCORE */
        section[id] { scroll-margin-top: 140px; }

        /* NAVBAR PRINCIPALE (Stile Master) */
        .navbar { border-bottom: 1px solid #eee; background: white !important; }
        .navbar-brand { 
            color: var(--primary-color) !important; 
            font-size: 1.2rem !important; 
            font-weight: bold; 
            line-height: 1.2; 
        }
        .nav-link { 
            font-weight: 600; 
            font-size: 0.85rem !important; 
            text-transform: uppercase; 
            color: var(--text-muted) !important; 
            padding: 5px 12px !important; 
            transition: 0.3s;
            letter-spacing: 0.3px;
        }
        .nav-link:hover { color: var(--primary-color) !important; }

        /* SOTTO-BARRA DI NAVIGAZIONE RAPIDA */
        .sub-nav {
            background: #fff;
            border-bottom: 1px solid #eee;
            position: sticky;
            top: 66px;
            z-index: 999;
            padding: 14px 0;
        }
        .sub-nav a {
            font-size: 0.85rem; 
            text-transform: uppercase;
            font-weight: 700;
            color: var(--primary-color);
            text-decoration: none;
            margin: 0 15px;
            transition: 0.3s;
        }
        .sub-nav a:hover { color: var(--accent-color); }
        
        /* DROPDOWN */
        .dropdown-menu { border: none; box-shadow: 0 10px 30px rgba(0,0,0,0.08); border-radius: 12px; }
        .dropdown-item { font-size: 0.85rem; font-weight: 600; padding: 10px 20px; color: var(--text-muted); }
        .dropdown-item.active-section { 
            color: var(--primary-color) !important; 
            background: transparent; 
            pointer-events: none;
            display: flex; align-items: center; justify-content: space-between;
        }

        /* HERO SECTION */
        .hero-history { 
            background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), url('../immagini/storia-hero.jpg');
            background-size: cover; background-position: center; height: 35vh; 
            display: flex; align-items: center; justify-content: center; color: white;
        }

        /* BLOCCHI STILE VETRINA */
        .section-padding { padding: 90px 0; }
        .bg-vetrina { background-color: var(--vetrina-bg); } /* Colore ripreso dalla vetrina */

        .section-title { 
            color: var(--primary-color); 
            font-weight: bold; 
            position: relative; 
            padding-bottom: 15px; 
            margin-bottom: 2rem; 
            font-size: 2rem;
        }
        .section-title::after { 
            content: ''; width: 50px; height: 3px; background: #ccd1d9; 
            position: absolute; bottom: 0; left: 0; 
        }

        .lead-text { font-size: 1.1rem; color: var(--text-dark); margin-bottom: 1.5rem; }

        .img-featured { 
            border-radius: 12px; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.1); 
            width: 100%; height: 400px; object-fit: cover;
            transition: transform 0.3s ease;
        }
        .img-featured:hover { transform: translateY(-5px); }

        footer { padding: 60px 0; font-size: 0.9rem; background-color: var(--primary-color); color: white; }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-light bg-white sticky-top shadow-sm py-1">
