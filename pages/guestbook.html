        <p>Email: <strong id="contatto-mail" style="color: white !important;"></strong></p>
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
    // 1. Caricamento dati Vetrina (Footer e Email)
    async function caricaMaster() {
        try {
            const res = await fetch('../contenuti-vetrina.json');
            const data = await res.json();
            document.getElementById('contatto-mail').innerText = data.emailContatto || "";
            document.getElementById('footer-text').innerHTML = "© 2026 " + (data.nomeProLoco || "Pro Loco Albano");
        } catch (e) { console.error("Errore caricamento JSON:", e); }
    }
    caricaMaster();

    // 2. CONFIGURAZIONE DISQUS
    // Assicurati che 'prolocoalbano' sia lo shortname esatto registrato su Disqus
    var disqus_config = function () {
        this.page.url = window.location.href;  
        this.page.identifier = 'guestbook_albano_proloco'; 
    };

    (function() { 
        var d = document, s = d.createElement('script');
        // HO IMPOSTATO LO SHORTNAME prolocoalbano (senza trattini dopo proloco)
        s.src = 'https://prolocoalbano.disqus.com/embed.js'; 
        s.setAttribute('data-timestamp', +new Date());
        (d.head || d.body).appendChild(s);
    })();
</script>
